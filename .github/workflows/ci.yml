name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # PHP is not pre-installed on macos-latest; this action installs it
      # along with the mongodb PECL extension in one step.
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mongodb

      # setup-php replaces PATH wholesale; restore Go and Java explicitly.
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      # Ruby on macos-latest may be older than the mongo gem requires.
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler: "latest"

      - name: Start MongoDB
        run: |
          brew tap mongodb/brew
          brew install mongodb-community
          brew services start mongodb/brew/mongodb-community
          until mongosh --quiet --eval "db.runCommand({ping:1})" 2>/dev/null; do sleep 1; done

      - name: Install C driver
        run: brew install mongo-c-driver

      - name: Install C++ driver
        run: brew install mongo-cxx-driver

      - name: C
        run: bash c/run.sh

      - name: C++
        run: bash cxx/run.sh

      - name: Go
        run: bash go/run.sh

      - name: Rust
        run: bash rust/run.sh

      - name: Ruby
        run: bash ruby/run.sh

      - name: PHP
        run: bash php/run.sh

      - name: Python
        run: bash python/run.sh

      - name: Java
        run: bash java/run.sh

      - name: C#
        run: bash csharp/run.sh

      - name: Node
        run: bash node/run.sh
